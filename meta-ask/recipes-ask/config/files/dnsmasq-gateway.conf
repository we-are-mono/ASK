interface=eth4
bind-interfaces
listen-address=192.168.1.1
dhcp-range=192.168.1.100,192.168.1.200,24h
dhcp-option=option:router,192.168.1.1
# Point DHCP clients straight at Cloudflare — the target itself runs
# dnsmasq with port=0 (DNS disabled, DHCP-only), so a previous value
# of 192.168.1.1 here advertised a DNS server that wasn't listening.
dhcp-option=option:dns-server,1.1.1.1
port=0
