CONFIG_NXP_ASK=y
CONFIG_ASK_CDX=m
CONFIG_ASK_FCI=m
CONFIG_ASK_AUTO_BRIDGE=m
CONFIG_ASK_SFP_LED=m
CONFIG_ASK_LEDS_LP5812=m

# 802.1Q built into the kernel — needed by the VLAN data-plane tests
# and small enough (~30 KB) that the alternative (pulling in the module
# package via kernel-module-8021q) isn't worth the packaging dance.
CONFIG_VLAN_8021Q=y

# meta-ask is a dedicated test image (production runs Armbian). Enable
# heavyweight kernel debug/sanitizer options so the test harness can catch
# memory-safety, locking, and UB regressions the instant they appear.

# KASAN: heap/stack/global out-of-bounds + use-after-free.
# Temporarily disabled to bisect whether the FM_PCD_Init memset crash is
# KASAN-induced (instrumentation changes allocator layout → FMAN's hand-
# rolled MM_Get sees different pointers) or a pre-existing latent bug.
# Re-enable once diagnosed.
# CONFIG_KASAN is not set
# CONFIG_KASAN_GENERIC is not set
# CONFIG_KASAN_INLINE is not set
# CONFIG_KASAN_STACK is not set
# CONFIG_KASAN_VMALLOC is not set

# KFENCE: low-overhead sampling complement to KASAN.
CONFIG_KFENCE=y
CONFIG_KFENCE_SAMPLE_INTERVAL=100
CONFIG_KFENCE_NUM_OBJECTS=255

# Kmemleak: catch leaked allocations on module unload.
CONFIG_DEBUG_KMEMLEAK=y
# CONFIG_DEBUG_KMEMLEAK_DEFAULT_OFF is not set
CONFIG_DEBUG_KMEMLEAK_MEM_POOL_SIZE=16000

# UBSAN: integer overflow, shift-out-of-range, null deref, array bounds.
CONFIG_UBSAN=y
CONFIG_UBSAN_BOUNDS=y
CONFIG_UBSAN_SHIFT=y

# Lockdep + PROVE_LOCKING: runtime validation of lock-ordering/contexts.
# The qbman dpa_alloc_new sleep-in-atomic is fixed by patch 003; the FMAN
# FmPcdLockTryLockAll recursive-lock warning is still open but doesn't
# block boot — accept the noise until its fix lands.
CONFIG_LOCKDEP=y
CONFIG_PROVE_LOCKING=y
CONFIG_DEBUG_LOCK_ALLOC=y
CONFIG_DEBUG_SPINLOCK=y
CONFIG_DEBUG_MUTEXES=y
CONFIG_DEBUG_ATOMIC_SLEEP=y
CONFIG_LOCK_STAT=y

# Fault injection: used by A3a-e init-cascade tests.
CONFIG_FAULT_INJECTION=y
CONFIG_FAULT_INJECTION_DEBUG_FS=y
CONFIG_FAILSLAB=y
CONFIG_FAIL_PAGE_ALLOC=y

# Stack traces + full DWARF so KASAN/lockdep splats are symbolic.
CONFIG_STACKTRACE=y

# Disable KASLR + stack-offset randomization so oops offsets are
# reproducible across boots (makes crash triage deterministic).
# CONFIG_RANDOMIZE_BASE is not set
# CONFIG_RANDOMIZE_KSTACK_OFFSET_DEFAULT is not set
