# KASAN-enabled config fragment. Layered over ask.cfg only when the
# top-level build was invoked as `KASAN=1 kas build .config.yaml`
# (see linux-ask_6.12.bb's do_configure:append). Default builds skip
# this file entirely so the image stays fast.
#
# Why not always on: KASAN bloats the kernel image by ~13 MB and adds
# ~60% to a full-suite run on the LS1046A target. The bug-finding
# value tapers after the initial sanitizer sweep on a previously-
# uninstrumented codebase, so the steady-state default is off; turn
# it on after landing memory-touching changes (cdx allocs, ehash
# table entries, etc.) or when investigating a memory-class bug.
#
# Companion: vendored DPAA/FMAN/QBMan trees are KASAN_SANITIZE := n
# in their Makefiles (kernel patch 094), so this fragment only
# instruments code we maintain.
CONFIG_KASAN=y
CONFIG_KASAN_GENERIC=y
CONFIG_KASAN_INLINE=y
CONFIG_KASAN_STACK=y
CONFIG_KASAN_VMALLOC=y
