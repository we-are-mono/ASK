DISTRO = "ask"
DISTRO_NAME = "ASK Test Distro"
DISTRO_VERSION = "1.0"
MAINTAINER = "Tomaz Zaman <tomaz@mono.si>"

# No systemd, no GUI, no package manager — this is a boot-to-shell test image.
DISTRO_FEATURES = ""

VIRTUAL-RUNTIME_init_manager = "busybox"
VIRTUAL-RUNTIME_initscripts  = "initscripts"
VIRTUAL-RUNTIME_base-utils   = "busybox"
VIRTUAL-RUNTIME_login_manager = "busybox"

# Quieter QA for an out-of-tree vendor-heavy build.
WARN_QA:append  = " buildpaths ldflags"
