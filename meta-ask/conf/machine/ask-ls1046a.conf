#@TYPE: Machine
#@NAME: ASK LS1046A test target
#@DESCRIPTION: LS1046A-based gateway used for ASK stack testing via netboot.

# CPU tuning
require conf/machine/include/arm/armv8a/tune-cortexa72.inc

MACHINE_FEATURES = "usbhost pci rtc serial"

SERIAL_CONSOLES = "115200;ttyS0"

# Kernel recipe provided by this layer.
PREFERRED_PROVIDER_virtual/kernel = "linux-ask"

KERNEL_IMAGETYPE ?= "Image.gz"
KERNEL_DEVICETREE = "freescale/mono-gateway-dk.dtb"

# Bundle the test initramfs directly into the kernel — one tftpboot file.
INITRAMFS_IMAGE = "ask-image"
INITRAMFS_IMAGE_NAME = "ask-image-${MACHINE}.rootfs"
INITRAMFS_IMAGE_BUNDLE = "1"
INITRAMFS_MAXSIZE = "536870912"
