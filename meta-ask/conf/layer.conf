BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-ask"
BBFILE_PATTERN_meta-ask = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-ask = "15"

LAYERDEPENDS_meta-ask = "core openembedded-layer"
LAYERSERIES_COMPAT_meta-ask = "walnascar"

# Root of the ASK source tree — used by ask-modules / ask-userspace recipes
# as the externalsrc path so developers can iterate on uncommitted changes.
ASK_SRCROOT = "${LAYERDIR}/.."
